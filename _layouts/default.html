<!DOCTYPE html>
<html lang="pt-br">
{% include head.html %}
<body class="{{ page.body_class }}">

    {% include player.html %}
    {% include menu.html %}

    <div id="main-content">
        {{ content }}
    </div>

    {% include footer.html %}

    <script>
        const audio = document.getElementById('main-audio');
        
        // Recuperar estado salvo
        const savedTime = localStorage.getItem('audio-time');
        const isMuted = localStorage.getItem('audio-muted') === 'true';
        const wasPlaying = localStorage.getItem('audio-playing') === 'true';
        const savedVolume = localStorage.getItem('audio-volume');

        if (savedTime) audio.currentTime = parseFloat(savedTime);
        if (savedVolume) audio.volume = parseFloat(savedVolume);
        else audio.volume = 0.1;
        
        audio.muted = isMuted;
        updateMuteIcon();

        // Salvar estado periodicamente e antes de sair
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('audio-time', audio.currentTime);
            localStorage.setItem('audio-muted', audio.muted);
            localStorage.setItem('audio-playing', !audio.paused);
            localStorage.setItem('audio-volume', audio.volume);
        });

        // Função para atualizar os ícones do player
        function updateIcons(isPlaying) { 
            const playSvg = document.getElementById('play-svg');
            const pauseSvg = document.getElementById('pause-svg');
            if (playSvg && pauseSvg) {
                playSvg.style.display = isPlaying ? 'none' : 'block'; 
                pauseSvg.style.display = isPlaying ? 'block' : 'none'; 
            }
        }

        // Tentar retomar o áudio se ele estava tocando
        if (wasPlaying) {
            audio.play().then(() => updateIcons(true)).catch(() => {
                console.log("Autoplay bloqueado, aguardando interação.");
            });
        }

        // Função de Play/Pause
        function togglePlay() {
            if (audio.paused) {
                audio.play().then(() => updateIcons(true)).catch(e => console.error("Erro áudio:", e));
            } else {
                audio.pause();
                updateIcons(false);
            }
        }

        // Trick para navegadores: Tenta tocar no primeiro clique em qualquer lugar da página
        document.addEventListener('click', function() {
            if (audio.paused && (wasPlaying || audio.currentTime === 0)) {
                audio.play().then(() => {
                    updateIcons(true);
                }).catch(() => {});
            }
        }, { once: true });

        function changeVolume(v) { 
            audio.volume = v; 
            localStorage.setItem('audio-volume', v);
        }
        
        function updateMuteIcon() {
            const soundSvg = document.getElementById('sound-svg');
            const muteSvg = document.getElementById('mute-svg');
            if (soundSvg && muteSvg) {
                soundSvg.style.display = audio.muted ? 'none' : 'block';
                muteSvg.style.display = audio.muted ? 'block' : 'none';
            }
        }

        function toggleMute() { 
            audio.muted = !audio.muted; 
            updateMuteIcon();
            localStorage.setItem('audio-muted', audio.muted);
        }

        audio.ontimeupdate = function() { 
            const pBall = document.getElementById('progress-ball');
            if (pBall && audio.duration) {
                const p = (audio.currentTime / audio.duration) * 100; 
                pBall.style.left = p + '%'; 
            }
            // Salvar o tempo a cada 5 segundos para garantir
            if (Math.floor(audio.currentTime) % 5 === 0) {
                localStorage.setItem('audio-time', audio.currentTime);
            }
        };
        
        function toggleMenu() { document.getElementById('dropdownMenu').classList.toggle('active'); }
        window.onclick = function(e) { if (!e.target.closest('#menu-container')) { const m = document.getElementById('dropdownMenu'); if (m && m.classList.contains('active')) m.classList.remove('active'); } }
    </script>
</body>
</html>
