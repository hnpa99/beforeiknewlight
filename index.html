---
layout: default
title: Cover
body_class: cover-page
---

<style>
    /* --- Hero Cover --- */
    #hero-cover { width: 100%; height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #1a1a1a; }
    #hero-cover video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 56%; z-index: 1; }
    #hero-cover h1 { position: relative; z-index: 10; color: #ffffff; font-family: 'Gerady Bale', serif; font-size: 64px; font-weight: normal; text-align: center; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); margin: 0; letter-spacing: 1px; }

    /* --- Gallery Grid --- */
    #gallery-section { padding: 100px 5vw 120px; background-color: var(--bg-cream); }
    .masonry-columns { 
        display: flex; 
        justify-content: center; 
        gap: 30px; 
    }
    .grid-item { display: inline-block; max-width: 400px; width: 100%; text-align: center; }
    .grid-item img { height: auto; display: block; margin: 0 auto; box-shadow: 0 5px 25px rgba(0,0,0,0.04); max-width: 100%; }

    @media (max-width: 600px) { .masonry-columns { flex-direction: column; align-items: center; } }
</style>

<main id="hero-cover">
    <video autoplay loop muted playsinline><source src="{{ site.baseurl }}/assets/video/covervideo.MP4" type="video/mp4"></video>
    <h1>{{ site.title }}</h1>
</main>

<section id="gallery-section">
    <div class="masonry-columns">
        <!-- Uma foto representativa por projeto -->
        <div class="grid-item">
            <img src="{{ site.baseurl }}/assets/images/home/DSC00692.jpg" alt="Home Project">
        </div>
    </div>
</section>
