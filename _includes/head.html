<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alternate+Gothic+No+1+D&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Gerady Bale';
            src: url('{{ site.baseurl }}/assets/fonts/Gerady-Bale.otf') format('opentype');
        }

        :root {
            --petroleum-gray: #2F4F4F;
            --bg-cream: #fffbe2;
            --metallic-light: #E0E0E0;
            --metallic-dark: #BDBDBD;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; background-color: var(--bg-cream); width: 100%; min-height: 100vh; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--petroleum-gray); overflow-x: hidden; }

        /* --- Music Player FIX --- */
        #music-player {
            width: 100%; height: 30px; background: linear-gradient(to bottom, var(--metallic-light), var(--metallic-dark));
            display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #999;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: fixed; top: 0; left: 0; z-index: 5000;
            color: var(--petroleum-gray); font-size: 11px;
        }
        .player-content { display: flex; align-items: center; width: 95%; max-width: 1200px; }
        .album-art { width: 22px; height: 22px; margin-right: 10px; border: 1px solid #999; overflow: hidden; }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        .song-info { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 15px; }
        .progress-bar { flex-grow: 1; height: 2px; background-color: rgba(47, 79, 79, 0.2); position: relative; margin-right: 15px; }
        .progress-handle { position: absolute; left: 0%; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background-color: var(--petroleum-gray); border-radius: 50%; }
        .player-controls { display: flex; gap: 15px; align-items: center; }
        .btn-control { cursor: pointer; display: flex; align-items: center; justify-content: center; width: 16px; }
        .btn-control svg { fill: var(--petroleum-gray); width: 12px; height: 12px; }
        
        /* FIX: Volume button/slider size */
        .volume-container { display: flex; align-items: center; gap: 5px; }
        #volume-slider { 
            -webkit-appearance: none;
            appearance: none;
            width: 40px !important; 
            height: 2px; 
            background: rgba(47, 79, 79, 0.2);
            cursor: pointer; 
            outline: none;
            margin: 0; padding: 0; 
        }

        /* Estilização da bolinha (thumb) idêntica à progress-handle */
        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 8px;
            height: 8px;
            background: var(--petroleum-gray);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        #volume-slider::-moz-range-thumb {
            width: 8px;
            height: 8px;
            background: var(--petroleum-gray);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* --- Stairs Menu --- */
        #menu-container { position: fixed; top: 52px; right: 30px; z-index: 3001; display: flex; flex-direction: column; align-items: flex-end; }
        .stairs-menu { display: flex; flex-direction: column; gap: 3px; cursor: pointer; align-items: flex-end; }
        .stairs-line { height: 2px; background-color: #ffffff; border-radius: 1px; box-shadow: 1px 1px 4px rgba(0,0,0,0.6); width: 25px; transition: all 0.3s ease; }
        .line2 { width: 18px; } .line3 { width: 11px; }
        body.dark-menu .stairs-line { background-color: var(--petroleum-gray); box-shadow: none; }
        .dropdown-menu { display: none; background-color: transparent; min-width: 180px; margin-top: 10px; flex-direction: column; align-items: flex-end; }
        .dropdown-menu.active { display: flex; }
        .dropdown-menu a { color: #ffffff; padding: 5px 0; text-decoration: none; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }
        body.dark-menu .dropdown-menu a { color: var(--petroleum-gray); text-shadow: none; }

        /* --- Footer & Back Link Padronizado --- */
        footer { 
            width: 100%;
            height: 200px;
            padding: 60px 8vw 40px; 
            text-align: center; 
            font-size: 11px; 
            text-transform: uppercase;
            background-color: var(--bg-cream);
            position: relative;
        }
        .footer-line { width: 100%; height: 1px; background-color: rgba(0,0,0,0.05); margin-bottom: 40px; }

        .back-link-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 60px;
            margin-bottom: 20px;
        }
        .back-link {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid var(--petroleum-gray);
            padding-bottom: 5px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .back-link:hover { opacity: 1; }
    </style>
</head>
