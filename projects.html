---
layout: default
title: Projects
body_class: dark-menu
---

<style>
    /* --- Projects Index --- */
    #projects-index {
        padding: 120px 15vw 120px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .projects-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 80px 50px;
        width: 100%;
    }

    .project-item {
        text-decoration: none;
        color: inherit;
        text-align: left;
    }

    .project-cover {
        width: 100%;
        aspect-ratio: 4 / 5;
        background-color: #eee;
        margin-bottom: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    }

    .project-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .project-title {
        font-family: 'Alternate Gothic No 1 D', sans-serif;
        font-size: 13px;
        font-weight: normal;
        letter-spacing: 0.5px;
        margin: 0 0 2px 0;
        color: var(--petroleum-gray);
        text-transform: none;
    }

    .project-category {
        font-size: 10px;
        letter-spacing: 1px;
        opacity: 0.5;
        display: inline-block; 
        text-transform: none; 
        text-decoration: underline; 
        text-underline-offset: 3px; 
    }

    .back-link {
        margin-top: 80px;
        display: inline-block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: inherit;
        text-decoration: none;
        border-bottom: 1px solid var(--petroleum-gray);
        padding-bottom: 5px;
        opacity: 0.6;
        transition: opacity 0.3s;
    }
    .back-link:hover { opacity: 1; }

    @media (max-width: 900px) { .projects-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .projects-grid { grid-template-columns: 1fr; } }
</style>

<main id="projects-index">
    <div class="projects-grid">
        <!-- Project 0: Home -->
        <a href="{{ site.baseurl }}/project-home/" class="project-item">
            <div class="project-cover">
                <img src="{{ site.baseurl }}/assets/images/home/DSC00692.jpg" alt="">
            </div>
            <h2 class="project-title">Home</h2>
            <span class="project-category">Personal</span>
        </a>
    </div>

    <a href="{{ site.baseurl }}/" class="back-link">Back to Cover</a>
</main>
