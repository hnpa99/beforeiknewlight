---
layout: default
title: Contact
body_class: dark-menu
---

<style>
    /* --- Contact Content --- */
    #contact-wrapper {
        padding: 150px 15vw 100px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .contact-info {
        max-width: 600px;
        line-height: 2.5;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .contact-info a {
        color: inherit;
        text-decoration: none;
        border-bottom: 1px solid rgba(47, 79, 79, 0.3);
        transition: border-color 0.3s;
    }

    .contact-info a:hover {
        border-bottom-color: var(--petroleum-gray);
    }

    .back-link {
        margin-top: 60px;
        display: inline-block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: inherit;
        text-decoration: none;
        border-bottom: 1px solid var(--petroleum-gray);
        padding-bottom: 5px;
        opacity: 0.6;
        transition: opacity 0.3s;
    }
    .back-link:hover { opacity: 1; }
</style>

<main id="contact-wrapper">
    <h1>Contact</h1>
    <div class="contact-info">
        <p>Email: <a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
        <p>Instagram: <a href="https://instagram.com/beforeiknewlight" target="_blank">@beforeiknewlight</a></p>
        <p>Phone: <a href="tel:+5500000000000">+55 00 00000-0000</a></p>
    </div>
    <a href="{{ site.baseurl }}/" class="back-link">Back to Cover</a>
</main>
