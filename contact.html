<style>
    /* --- Contact Content --- */
    #contact-wrapper {
        padding: 150px 15vw 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        min-height: calc(100vh - 200px);
    }

    h1 {
        font-family: 'Alternate Gothic No 1 D', sans-serif;
        font-weight: normal;
        font-size: 24px;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 40px;
    }

    .contact-info {
        max-width: 600px;
        line-height: 2.5;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .contact-info a {
        color: inherit;
        text-decoration: none;
        border-bottom: 1px solid rgba(47, 79, 79, 0.3);
        transition: border-color 0.3s;
    }

    .contact-info a:hover {
        border-bottom-color: var(--petroleum-gray);
    }

    @media (max-width: 600px) {
        #contact-wrapper { padding-top: 100px; padding-left: 8vw; padding-right: 8vw; }
        h1 { font-size: 20px; margin-bottom: 30px; }
        .contact-info { font-size: 12px; letter-spacing: 1px; }
    }
</style>

<main id="contact-wrapper">
    <h1>Contact</h1>
    <div class="contact-info">
        <p>Email: <a href="mailto:"></a></p>
        <p>Instagram: <a href="" target="_blank"></a></p>
    </div>
</main>

<div class="back-link-container">
    <a href="{{ site.baseurl }}/" class="back-link">Back to Cover</a>
</div>
